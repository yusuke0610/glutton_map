name: CI

# main への push と、すべての PR でテストを自動実行する。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    name: backend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod の go ディレクティブからバージョンを決め、go.sum でキャッシュする。
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Makefile の test ターゲット（go test -race -count=1 ./...）をそのまま使う。
      - name: make test
        run: make test
