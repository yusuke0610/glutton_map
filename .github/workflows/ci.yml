name: CI

# main への push と、すべての PR でテストを自動実行する。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    name: backend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # go.mod の go ディレクティブからバージョンを決め、go.sum でキャッシュする。
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: make test-backend
        run: make test-backend

  backend-lint:
    name: backend lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.12.2
          working-directory: backend

  web-test:
    name: web lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: bun install
        run: bun install --frozen-lockfile

      # types.gen.ts は生成物（gitignore）なので openapi.yaml から生成しておく。
      - name: gen types
        run: bun run gen

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

      - name: build
        run: bun run build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # E2E は Go バックエンドも起動するため両方のツールチェーンを用意する。
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: bun install
        working-directory: web
        run: bun install --frozen-lockfile

      # フロントが import する types.gen.ts を生成しておく。
      - name: gen types
        working-directory: web
        run: bun run gen

      - name: install playwright browser
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: e2e
        working-directory: web
        run: bun run test:e2e
