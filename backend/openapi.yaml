openapi: 3.0.3
info:
  title: glutton_map API
  version: 0.1.0
  description: |
    最小ヒートマップ・スライスの契約。これが唯一の真実（spec-first）。
    Go サーバ型は oapi-codegen、フロント TS 型は openapi-typescript で本ファイルから生成する。
servers:
  - url: http://localhost:8001
paths:
  /api/pins:
    get:
      operationId: getApiPins
      summary: ヒートマップ用のピン一覧を取得する
      responses:
        "200":
          description: ピン一覧と集計
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinsResponse"
    post:
      operationId: postApiPins
      summary: ファンがピンを1件投稿する（認証なし）
      description: |
        座標はサーバが都道府県の重心+ゆらぎで生成する。クライアントから lat/lng は受け取らない。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePinRequest"
      responses:
        "201":
          description: 作成されたピン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"
        "400":
          description: 入力が不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Pin:
      type: object
      required: [prefecture, lat, lng]
      properties:
        prefecture:
          $ref: "#/components/schemas/Prefecture"
        lat:
          type: number
          format: double
          example: 33.56
        lng:
          type: number
          format: double
          example: 133.53
        weight:
          type: integer
          default: 1
          description: ヒートの重み。最小スライスでは件数で密度を表現するため通常 1。
        nickname:
          type: string
          description: 投稿者のニックネーム。seed 由来のピンでは空。
        city:
          type: string
          description: 市区町村（表示用）。seed 由来のピンでは空。
        comment:
          type: string
          description: 一言コメント。seed 由来のピンでは空。
    CreatePinRequest:
      type: object
      required: [nickname, prefecture, city]
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 30
          description: 投稿者のニックネーム。
        prefecture:
          $ref: "#/components/schemas/Prefecture"
        city:
          type: string
          minLength: 1
          maxLength: 50
          description: 市区町村（表示用テキスト。座標には使わない）。
        comment:
          type: string
          maxLength: 200
          description: 一言コメント（任意）。
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: ユーザー向けエラーメッセージ。
    PinsResponse:
      type: object
      required: [pins, prefecture_count, total]
      properties:
        pins:
          type: array
          items:
            $ref: "#/components/schemas/Pin"
        prefecture_count:
          type: integer
          description: ヒーロー指標。何都道府県に散らばっているか。
        total:
          type: integer
          description: ピン総数。
    Prefecture:
      type: string
      description: 標準47都道府県
      enum:
        - 北海道
        - 青森県
        - 岩手県
        - 宮城県
        - 秋田県
        - 山形県
        - 福島県
        - 茨城県
        - 栃木県
        - 群馬県
        - 埼玉県
        - 千葉県
        - 東京都
        - 神奈川県
        - 新潟県
        - 富山県
        - 石川県
        - 福井県
        - 山梨県
        - 長野県
        - 岐阜県
        - 静岡県
        - 愛知県
        - 三重県
        - 滋賀県
        - 京都府
        - 大阪府
        - 兵庫県
        - 奈良県
        - 和歌山県
        - 鳥取県
        - 島根県
