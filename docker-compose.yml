services:
  api:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/data:/app/data
    environment:
      # ${VAR:-既定値} … 未設定なら既定値、ルートの .env やシェルがあれば上書き。
      - LIBSQL_URL=${LIBSQL_URL}
      # 許可するフロントのオリジン（カンマ区切りで複数可）
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
